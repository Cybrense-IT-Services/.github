<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">Cybrense IT Services</title>
  <desc id="desc">Engineered for trust. Built to scale.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#041226"/>
      <stop offset="0.55" stop-color="#071f3f"/>
      <stop offset="1" stop-color="#08325c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#1b7cff" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#1b7cff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#8cc8ff" stroke-opacity="0.08"/>
      <circle cx="1" cy="1" r="1" fill="#8cc8ff" fill-opacity="0.2"/>
    </pattern>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="24" fill="url(#bg)"/>
  <rect width="1280" height="360" rx="24" fill="url(#grid)"/>
  <ellipse cx="1060" cy="175" rx="330" ry="250" fill="url(#glow)"/>
  <circle cx="1170" cy="65" r="76" fill="#13b981" fill-opacity="0.08" filter="url(#soft)"/>

  <g opacity="0.28" stroke="#8cc8ff" fill="none">
    <path d="M760 76H900L950 126H1110"/>
    <path d="M730 278H860L912 226H1180"/>
    <path d="M820 112V248"/>
    <circle cx="760" cy="76" r="5" fill="#8cc8ff"/>
    <circle cx="730" cy="278" r="5" fill="#8cc8ff"/>
    <circle cx="1180" cy="226" r="5" fill="#8cc8ff"/>
  </g>

  <g transform="translate(80 83)">
    <rect width="8" height="194" rx="4" fill="#1b7cff"/>
    <text x="40" y="69" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="66" font-weight="800" letter-spacing="5">CYBRENSE</text>
    <text x="43" y="112" fill="#8cc8ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="8">IT SERVICES</text>
    <text x="43" y="166" fill="#d7e9ff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500" letter-spacing="1">ENGINEERED FOR TRUST. BUILT TO SCALE.</text>
  </g>

  <g transform="translate(1010 88)">
    <path d="M90 0 174 34v66c0 58-35 105-84 126C41 205 6 158 6 100V34Z" fill="#061d3a" fill-opacity="0.78" stroke="#52a4ff" stroke-width="4"/>
    <path d="M128 68a58 58 0 1 0 0 90" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>
    <circle cx="137" cy="63" r="7" fill="#13b981"/>
    <circle cx="137" cy="163" r="7" fill="#13b981"/>
  </g>
