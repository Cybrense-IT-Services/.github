name: Bug report
description: Report a reproducible problem in a Cybrense project
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve the project. Remove all secrets and personal data before submitting.
  - type: input
    id: project-version
    attributes:
      label: Project version or commit
      placeholder: v1.2.3 or commit SHA
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, browser, runtime, deployment method, and other relevant versions.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: Do not include credentials, tokens, personal data, or private configuration.
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: This is not a security vulnerability.
          required: true
