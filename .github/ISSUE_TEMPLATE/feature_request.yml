name: Feature request
description: Propose a focused improvement to a Cybrense project
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What need would this feature address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior and the user experience you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches or workarounds did you consider?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, mockups, or technical constraints when useful.
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues for a similar request.
          required: true
        - label: I am willing to help implement or test this feature.
          required: false
